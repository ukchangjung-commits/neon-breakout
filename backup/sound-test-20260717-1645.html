<title>네온 벽돌깨기 — 사운드 테스트</title>
<meta name="google" content="notranslate">
<style>
  :root{
    --bg:#070b16; --panel:#0d1426; --line:#1d2b4d;
    --cyan:#22e6ff; --magenta:#ff3df0; --amber:#ffc233; --text:#cfe6ff; --dim:#5f7396;
    --mono: ui-monospace, "Consolas", "Courier New", monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100dvh; background:radial-gradient(1100px 640px at 50% -12%, #101c3a 0%, var(--bg) 62%);
    color:var(--text); font-family:var(--mono); display:flex; flex-direction:column; align-items:center;
    gap:20px; padding:32px 18px 48px;
  }
  h1{ margin:0; font-size:clamp(20px,5vw,30px); letter-spacing:.06em; color:var(--cyan);
      text-shadow:0 0 14px rgba(34,230,255,.55); text-align:center; text-wrap:balance; }
  .sub{ margin:0; color:var(--dim); font-size:13px; text-align:center; line-height:1.7; max-width:44ch; }
  .hint{ color:var(--amber); }
  .grid{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:440px; }
  button.sfx{
    display:flex; align-items:center; gap:12px; width:100%; text-align:left; cursor:pointer;
    background:var(--panel); color:var(--text); border:2px solid var(--line); border-radius:12px;
    padding:14px 16px; font-family:var(--mono); font-size:15px; transition:border-color .12s, box-shadow .12s, transform .05s;
  }
  button.sfx:hover{ border-color:var(--cyan); box-shadow:0 0 14px rgba(34,230,255,.28); }
  button.sfx:active{ transform:translateY(1px) scale(.995); }
  button.sfx:focus-visible{ outline:3px solid var(--amber); outline-offset:2px; }
  button.sfx .ico{ font-size:20px; width:26px; text-align:center; }
  button.sfx .lab{ display:flex; flex-direction:column; gap:2px; }
  button.sfx .lab b{ font-weight:700; }
  button.sfx .lab small{ color:var(--dim); font-size:12px; }
  .max{ border-color:#5a3a12; }
  .max:hover{ border-color:var(--amber); box-shadow:0 0 14px rgba(255,194,51,.3); }
  .max .ico{ color:var(--amber); }
  .boom{ }
  .boom .ico{ color:var(--magenta); }
  .note{ color:var(--dim); font-size:12px; text-align:center; max-width:44ch; line-height:1.7; }
</style>

<h1>🔊 사운드 테스트</h1>
<p class="sub">네온 벽돌깨기의 실제 발사·폭발 효과음입니다.<br><span class="hint">버튼을 누르면 그 소리만 재생</span>됩니다. (소리 켜두세요)</p>

<div class="grid">
  <button class="sfx" onclick="playShoot()">
    <span class="ico">🔫</span><span class="lab"><b>일반 두두두 (1발)</b><small>shoot · vol 0.05 — 폭탄 없이 쏠 때</small></span>
  </button>
  <button class="sfx" onclick="rapid(()=>shoot(),14)">
    <span class="ico">🔫</span><span class="lab"><b>일반 두두두 (연발)</b><small>고속연사로 이어 쏠 때</small></span>
  </button>
  <button class="sfx max" onclick="rapid(()=>bombShotM60(LIMITER),14)">
    <span class="ico">💥</span><span class="lab"><b>최대출력 두두두 (연발) ×6 · M60풍</b><small>크랙+저역펀치 · 리미터 · 게임 연사간격(83ms)</small></span>
  </button>
  <button class="sfx" onclick="playBombShot()">
    <span class="ico">🟣</span><span class="lab"><b>일반 폭탄레이저 발사 (1발)</b><small>bombShot ×1 — 비교용</small></span>
  </button>
  <button class="sfx boom" onclick="playBoom()">
    <span class="ico">🧨</span><span class="lab"><b>폭탄 블록 폭발음</b><small>boom — 폭탄이 벽돌에서 터질 때</small></span>
  </button>
</div>

<p class="note">게임과 동일한 WebAudio 합성 코드로 재생합니다.<br>연발은 고속연사 간격(약 85ms)으로 14발을 이어 쏩니다.</p>

<script>
  let audio = null, masterGain = null, noiseBuf = null, LIMITER = null;
  function ensureAudio(){
    if(audio === null){
      try{
        audio = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audio.createGain();
        masterGain.gain.value = 1;
        masterGain.connect(audio.destination);
        const comp = audio.createDynamicsCompressor();
        const t0 = audio.currentTime;
        comp.threshold.setValueAtTime(-20, t0);
        comp.knee.setValueAtTime(18, t0);
        comp.ratio.setValueAtTime(8, t0);
        comp.attack.setValueAtTime(0.003, t0);
        comp.release.setValueAtTime(0.15, t0);
        const makeup = audio.createGain();
        makeup.gain.value = 1.05;
        comp.connect(makeup).connect(masterGain);
        LIMITER = comp;
      }catch(e){ audio = false; }
    }
    if(audio && audio.state !== 'running'){ const p = audio.resume && audio.resume(); if(p && p.catch) p.catch(()=>{}); }
  }
  function tone(freq, t, dur, type, vol, slide, out){
    if(!audio || !freq) return;
    t = Math.max(t, audio.currentTime);
    const v = vol > 0 ? vol : 0.05;
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t);
    if(slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
    gain.gain.setValueAtTime(v, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain).connect(out || masterGain);
    osc.start(t); osc.stop(t + dur);
  }
  function noise(t, dur, vol, freq, out){
    if(!audio) return;
    if(!noiseBuf){
      noiseBuf = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.5), audio.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = Math.random()*2 - 1;
    }
    const src = audio.createBufferSource(); src.buffer = noiseBuf;
    const flt = audio.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value = freq || 2000; flt.Q.value = 0.8;
    const g = audio.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(flt).connect(g).connect(out || masterGain);
    src.start(t); src.stop(t + dur);
  }
  // 게임과 동일 — 따발총 / 폭탄레이저 발사 / 대폭발
  function shoot(){ const t = audio.currentTime; tone(750 + Math.random()*350, t, 0.07, 'square', 0.05, -520); noise(t, 0.035, 0.05, 3200); }
  function bombShot(g, out){ g = g || 1; const t = audio.currentTime; tone(190, t, 0.18, 'sine', 0.09*g, -110, out); noise(t, 0.08, 0.05*g, 700, out); }
  // 최대출력 두두두 — M60풍(크랙+저역펀치+가스바디) ×6, 게임과 동일
  function bombShotM60(out){ const t = audio.currentTime; const g = 6;
    noise(t, 0.015, 0.05*g, 4200, out);
    tone(140, t, 0.15, 'sine', 0.09*g, -70, out);
    tone(68,  t, 0.13, 'sine', 0.07*g, -18, out);
    noise(t, 0.07, 0.045*g, 520, out);
  }
  function boom(){ const t = audio.currentTime; noise(t, 0.4, 0.14, 900); tone(95, t, 0.45, 'sawtooth', 0.1, -60); tone(55, t, 0.5, 'sine', 0.12, -25); }

  function playShoot(){ ensureAudio(); shoot(); }
  function playBombShot(){ ensureAudio(); bombShot(1); }
  function playBoom(){ ensureAudio(); boom(); }
  function rapid(fn, n){ ensureAudio(); let i = 0; (function tick(){ if(i++ >= n) return; fn(); setTimeout(tick, 83); })(); } // 게임 고속연사 5틱=83ms
</script>
